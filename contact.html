<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contacto | La Huerta</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Tu CSS -->
  <link rel="stylesheet" href="styles.css" />

  <!-- Font Awesome -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
  />
</head>
<body>

<!-- NAVBAR -->
<div id="navbar-container"></div>

<!-- Espacio navbar -->
<div style="margin-top:80px;"></div>

<!-- MAPA -->
<section class="map-section mb-5">
  <iframe
    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3723.7784519596586!2d-104.91594268494035!3d21.51817460228154!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x8427372ced97bdc5%3A0x87d08684f8c739bf!2sLa%20Huerta%20Cocina%20Econ%C3%B3mica!5e0!3m2!1ses!2smx!4v1708469149634!5m2!1ses!2smx"
    allowfullscreen=""
    loading="lazy"
    class="map-iframe">
  </iframe>
</section>

<section class="contact-section container mb-5">
  <div class="row align-items-start">
    <!-- Columna 1: Información de contacto -->
    <div class="col-md-6 mb-5 mb-md-0 text-center text-md-start">
      <h2 class="mb-4">Contacto</h2>
      <p><i class="fas fa-map-marker-alt"></i> Calle Mariano Abasolo 1143, Col. La Huerta, 63070</p>
      <p><i class="fas fa-phone"></i> Tel. 311 112 7771</p>
      <p><i class="fas fa-envelope"></i> contacto@lahuerta.com</p>
    </div>

    <!-- Columna 2: Formulario -->
    <div class="col-md-6">
      <h3 class="text-center text-md-start mb-4">Envíanos un mensaje</h3>
      <form class="contact-form mx-auto mx-md-0">
        <div class="mb-3">
          <input type="text" class="form-control" placeholder="Nombre" required>
        </div>
        <div class="mb-3">
          <input type="email" class="form-control" placeholder="Correo electrónico" required>
        </div>
        <div class="mb-3">
          <textarea class="form-control" rows="5" placeholder="Mensaje" required></textarea>
        </div>
        <button type="submit" class="btn btn-dark w-100">Enviar</button>
      </form>
    </div>
  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
</body>
</html>
